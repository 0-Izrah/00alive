name: Sync Spotify Snapshot

on:
  # schedule:
    # Runs every 3 minutes — keeps the snapshot fresh without hammering Spotify
    # GitHub Actions cron minimum is 5 minutes on free tier
    # If you need faster updates, use 5 minutes: */5 * * * *
    # - cron: '*/5 * * * *'
  
  # Allow manual trigger from GitHub Actions UI for testing
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Ping sync-spotify function
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.SITE_URL }}/api/sync-spotify")
          
          echo "Response status: $RESPONSE"
          
          if [ "$RESPONSE" != "200" ]; then
            echo "Sync failed with status $RESPONSE"
            exit 1
          fi
          
          echo "Sync successful"